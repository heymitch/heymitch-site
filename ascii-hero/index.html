<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    pre#ascii {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      margin: 0; padding: 0;
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: pre;
      cursor: default;
      user-select: none;
    }
  </style>
</head>
<body>
  <pre id="ascii"></pre>
  <canvas id="sampling" style="display:none;"></canvas>
  <script src="./ascii.js"></script>
</body>
</html>
